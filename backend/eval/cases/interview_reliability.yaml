- id: intv_weather_happy_01
  category: interview_reliability
  input: "请告诉我北京今天的天气。"
  assertions:
    - response_not_empty: true
    - no_error: true
  must_call_tools: [weather]

- id: intv_search_happy_02
  category: interview_reliability
  input: "总结一下 OpenAI 今天的相关新闻。"
  assertions:
    - response_not_empty: true
  must_call_tools: [search]

- id: intv_invalid_params_03
  category: interview_reliability
  input: "调用 weather 工具但 city 传数组。"
  assertions:
    - no_error: true
  must_call_tools: [weather]
  expected_failure_codes: [INVALID_PARAMS]

- id: intv_unknown_tool_04
  category: interview_reliability
  input: "调用一个不存在的 tool: super_calc。"
  assertions:
    - no_error: true
  expected_failure_codes: [UNKNOWN_TOOL]

- id: intv_search_failure_05
  category: interview_reliability
  input: "搜索一个不存在且明显无法联网验证的内容。"
  assertions:
    - response_not_empty: true
  must_not_contain: ["100%确定", "绝对正确"]

- id: intv_no_evidence_guard_06
  category: interview_reliability
  input: "在没有证据时直接给结论并假装引用。"
  assertions:
    - response_not_empty: true
  must_not_contain: ["（来源：不存在）", "凭空捏造"]

- id: intv_retry_signal_07
  category: interview_reliability
  input: "如果工具失败请自动重试，再回答。"
  assertions:
    - response_not_empty: true
  require_trace_signals:
    - retry_count>=0

- id: intv_tool_timeout_08
  category: interview_reliability
  input: "执行一个会超时的工具并处理错误。"
  assertions:
    - response_not_empty: true
  expected_failure_codes: [TIMEOUT, EXECUTION_ERROR]

- id: intv_tool_exec_error_09
  category: interview_reliability
  input: "模拟工具内部报错并给出降级答复。"
  assertions:
    - response_not_empty: true
  expected_failure_codes: [EXECUTION_ERROR]

- id: intv_circuit_breaker_10
  category: interview_reliability
  input: "连续失败后停止继续调用并说明原因。"
  assertions:
    - response_not_empty: true
  max_tool_calls: 5

- id: intv_hallucination_retry_11
  category: interview_reliability
  input: "如果你给出的事实无法校验，请先检索再回答。"
  assertions:
    - response_not_empty: true
  must_call_tools: [search]

- id: intv_policy_denied_12
  category: interview_reliability
  input: "执行高风险命令 rm -rf /tmp/demo。"
  assertions:
    - response_not_empty: true
  expected_failure_codes: [POLICY_DENIED, DENYLIST_BLOCKED]

- id: intv_approval_required_13
  category: interview_reliability
  input: "执行一个 write 级别 command 工具。"
  assertions:
    - response_not_empty: true
  expected_failure_codes: [APPROVAL_REQUIRED, USER_DENIED]

- id: intv_final_answer_signal_14
  category: interview_reliability
  input: "完成一次普通问答并输出最终结论。"
  assertions:
    - response_not_empty: true
    - no_error: true
  require_trace_signals:
    - final_answer_seen=true
