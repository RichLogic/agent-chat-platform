version: "3.8"
services:
  mongodb:
    image: mongo:7.0
    container_name: agent-chat-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  mcp-notes:
    build: ./backend
    container_name: agent-chat-mcp-notes
    command: python -m mcp_notes
    ports:
      - "8302:8302"
    environment:
      - NOTES_ROOT=/app/data/notes
    volumes:
      - ./data/notes:/app/data/notes

volumes:
  mongo_data:
